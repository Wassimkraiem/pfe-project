services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: uvicorn app.app:app --host 0.0.0.0 --reload
    volumes:
      - .:/app

  celery_worker:
    build: .
    environment:
      PYTHONUNBUFFERED: "1"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: celery -A app.celery_app:celery_app worker --loglevel=info
    volumes:
      - .:/app

  celery_beat:
    build: .
    environment:
      PYTHONUNBUFFERED: "1"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: celery -A app.celery_app:celery_app beat --loglevel=info
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
