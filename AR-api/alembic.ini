[alembic]
script_location = alembic
prepend_sys_path = .
file_template = %%(year)d%%(month)02d%%(day)02d_%%(rev)s_%%(slug)s

# URL is provided at runtime via env var / settings (see alembic/env.py)
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/authentic_rights
; Suggested local default (matches docker-compose.local.yml):
; sqlalchemy.url = postgresql+asyncpg://postgres:authentic@localhost:5433/authentic_rights

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

