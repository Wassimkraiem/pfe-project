services:
  flask-app:
    build: .
    container_name: flask-app
    restart: unless-stopped
    command:
      - /bin/bash
      - -c
      - flask run --debug --host=0.0.0.0
    environment:
      FLASK_RUN_RELOAD: 1
      PYTHONUNBUFFERED: 1
      FLASK_APP: sev.app:bviral_app
      FLASK_DEBUG: 1
      REDIS_URL: redis://videos-redis:6379/0
      SEARCH_CACHE_TTL: "300"
      SEARCH_CACHE_ENABLED: "true"
      DISABLE_EMBEDDINGS: "false"
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      VIDEOS_READ_ALIAS: ${VIDEOS_READ_ALIAS:-videos_read}
      VIDEOS_WRITE_ALIAS: ${VIDEOS_WRITE_ALIAS:-videos_write}
      ADVANCED_SEARCH_OPENAI_RERANK_MODE: ${ADVANCED_SEARCH_OPENAI_RERANK_MODE:-last_resort}
      OPENAI_RERANK_TIMEOUT_SECONDS: ${OPENAI_RERANK_TIMEOUT_SECONDS:-2}
      ADVANCED_SEARCH_OPENAI_RERANK_WEAK_GAP: ${ADVANCED_SEARCH_OPENAI_RERANK_WEAK_GAP:-0.015}
      ADVANCED_SEARCH_OPENAI_RERANK_WEAK_HEURISTIC: ${ADVANCED_SEARCH_OPENAI_RERANK_WEAK_HEURISTIC:-0.10}
      ADVANCED_SEARCH_RERANK_TOP_N: ${ADVANCED_SEARCH_RERANK_TOP_N:-30}
      ADVANCED_SEARCH_TOP_RANK_BONUS: ${ADVANCED_SEARCH_TOP_RANK_BONUS:-0.05}
      ADVANCED_SEARCH_TOP_RANK_2_3_BONUS: ${ADVANCED_SEARCH_TOP_RANK_2_3_BONUS:-0.02}
    env_file:
      - .env
    volumes:
      - .:/sev # Mount the current directory to /app in the container
    ports:
      - "5000:5000"
    depends_on:
      opensearch-node1:
        condition: service_started
      videos-redis:
        condition: service_healthy
    networks:
      - my-network

  videos-redis:
    image: redis:7-alpine
    container_name: videos-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - my-network

  opensearch-node1:
    image: opensearchproject/opensearch:3
    container_name: opensearch-node1
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.seed_hosts=opensearch-node1,opensearch-node2
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600
    networks:
      - my-network

  opensearch-node2:
    image: opensearchproject/opensearch:3
    container_name: opensearch-node2
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node2
      - discovery.seed_hosts=opensearch-node1,opensearch-node2
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true" # Prevents execution of bundled demo script which installs demo certificates and security configurations to OpenSearch
      - "DISABLE_SECURITY_PLUGIN=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data2:/usr/share/opensearch/data
    networks:
      - my-network

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3
    container_name: opensearch-dashboards
    ports:
      - 5601:5601
    expose:
      - "5601"
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch-node1:9200","http://opensearch-node2:9200"]'
      - "DISABLE_SECURITY_DASHBOARDS_PLUGIN=true"
    networks:
      - my-network

volumes:
  opensearch-data1:
  opensearch-data2:

networks:
  my-network:
    driver: bridge
