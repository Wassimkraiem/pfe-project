services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-helper-api
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload --reload-dir /app/app
    volumes:
      - ./:/app
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "8003:8003"
    restart: unless-stopped
